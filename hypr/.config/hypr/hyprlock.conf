
general {
hide_cursor = true
ignore_empty_input = true
}

background {
    monitor =
    path = ~/.cache/hyprlock/current_wallpaper.png 
    color = rgb(252, 249, 240)
    blur_passes = 2
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 1
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(252, 249, 240, 0.5) 
    inner_color = rgba(252, 249, 240, 0) 
    font_color = rgba(255, 255, 255, 0.8)
    fade_on_empty = true
    position = 0, -20
    halign = center
    valign = center

}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.8)
    font_size = 64
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}

