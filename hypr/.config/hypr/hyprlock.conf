
general {
hide_cursor = true
ignore_empty_input = true
}

background {
    monitor =
    path = screenshot 
    color = rgb(252, 249, 240)
    blur_passes = 2
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 1
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(252, 249, 240, 0.5) 
    inner_color = rgba(252, 249, 240, 0.2) 
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    position = 0, -20
    halign = center
    valign = center

}

label {
    monitor =
    text = $TIME
    color = rgb(10, 10, 10)
    font_size = 64
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}

